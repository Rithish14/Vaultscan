name: Vaultscan
description: Scan repositories for committed secrets and infrastructure-as-code risks.
author: Rithish14

branding:
  icon: shield
  color: green

inputs:
  scan-path:
    description: Path to scan, relative to the caller workspace.
    required: false
    default: .
  format:
    description: Report format. Supported values are text, json, sarif, and junit.
    required: false
    default: sarif
  output:
    description: Report output path.
    required: false
    default: vaultscan.sarif
  fail-on:
    description: Minimum severity that fails the workflow. Use none to report only.
    required: false
    default: high
  baseline:
    description: Optional baseline fingerprint file.
    required: false
    default: ""
  upload-sarif:
    description: Upload SARIF to GitHub code scanning when format is sarif.
    required: false
    default: "true"

runs:
  using: composite
  steps:
    - name: Set Up Java
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: "17"

    - name: Build Vaultscan
      shell: bash
      run: mvn -B -DskipTests package
      working-directory: ${{ github.action_path }}

    - name: Run Vaultscan
      id: scan
      shell: bash
      working-directory: ${{ github.workspace }}
      run: |
        set +e
        baseline_args=()
        if [ -n "${{ inputs.baseline }}" ]; then
          baseline_args=(--baseline "${{ inputs.baseline }}")
        fi

        java -jar "${{ github.action_path }}/target/vaultscan-1.0-SNAPSHOT.jar" \
          scan "${{ inputs.scan-path }}" \
          --format "${{ inputs.format }}" \
          --output "${{ inputs.output }}" \
          --fail-on "${{ inputs.fail-on }}" \
          "${baseline_args[@]}"

        status=$?
        echo "$status" > "$RUNNER_TEMP/vaultscan-exit-code"
        exit 0

    - name: Upload SARIF
      if: ${{ inputs.upload-sarif == 'true' && inputs.format == 'sarif' }}
      uses: github/codeql-action/upload-sarif@v4
      with:
        sarif_file: ${{ inputs.output }}

    - name: Fail On Blocking Findings
      shell: bash
      run: |
        status="$(cat "$RUNNER_TEMP/vaultscan-exit-code")"
        exit "$status"
