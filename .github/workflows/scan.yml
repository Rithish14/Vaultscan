name: Vaultscan CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  security-events: write

jobs:
  build-and-scan:
    name: Build, Test, And Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set Up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Build And Test
        run: mvn -B test package

      - name: Run Vaultscan Action
        uses: ./
        with:
          scan-path: .
          format: sarif
          output: vaultscan.sarif
          fail-on: high
          upload-sarif: ${{ github.event_name == 'push' }}
